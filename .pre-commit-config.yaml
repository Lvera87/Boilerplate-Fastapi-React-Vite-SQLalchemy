repos:
  # ---------- Backend (Python / Ruff via Astral) ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ---------- uv lockfile sync ----------
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.8
    hooks:
      - id: uv-lock
        files: ^backend/(pyproject\.toml|uv\.lock)$

  # ---------- Frontend (Biome) ----------
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.14
    hooks:
      - id: biome-check
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|jsonc)$
        additional_dependencies: ["@biomejs/biome@2.4.14"]

  # ---------- Generic checks ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/(biome\.json|tsconfig.*\.json)$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  # ---------- Secrets detection ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

ci:
  autofix_commit_msg: "ci: auto fixes from pre-commit hooks"
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'ci: update pre-commit hooks'
  autoupdate_schedule: weekly
  submodules: false
